<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" fill="none" viewBox="0 0 1200 1200">
  <!-- Background -->
  <rect width="1200" height="1200" fill="#f8fafc" rx="24"/>
  
  <!-- Education Logo Container -->
  <g transform="translate(300, 200)">
    <!-- Graduation Cap -->
    <g transform="translate(200, 100)">
      <!-- Cap Base -->
      <path d="M0 80 L200 80 L180 120 L20 120 Z" fill="#3b82f6" stroke="#1e40af" stroke-width="4"/>
      
      <!-- Cap Top -->
      <path d="M20 120 L180 120 L200 160 L0 160 Z" fill="#1e40af" stroke="#1e3a8a" stroke-width="4"/>
      
      <!-- Tassel -->
      <circle cx="100" cy="80" r="8" fill="#fbbf24"/>
      <path d="M100 72 L100 40" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <path d="M100 40 L80 20" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      <path d="M100 40 L120 20" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Cap Border -->
      <path d="M0 80 L200 80" stroke="#1e40af" stroke-width="6" stroke-linecap="round"/>
    </g>
    
    <!-- Book -->
    <g transform="translate(400, 200)">
      <!-- Book Pages -->
      <rect x="0" y="0" width="160" height="200" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="3"/>
      
      <!-- Book Cover -->
      <rect x="0" y="0" width="160" height="200" rx="8" fill="#10b981" stroke="#059669" stroke-width="3"/>
      
      <!-- Book Title Lines -->
      <rect x="20" y="60" width="120" height="4" rx="2" fill="#ffffff"/>
      <rect x="20" y="80" width="80" height="4" rx="2" fill="#ffffff"/>
      <rect x="20" y="100" width="100" height="4" rx="2" fill="#ffffff"/>
      
      <!-- Book Binding -->
      <rect x="150" y="0" width="10" height="200" fill="#059669"/>
    </g>
    
    <!-- AI Circuit Pattern -->
    <g transform="translate(100, 400)" opacity="0.3">
      <circle cx="0" cy="0" r="4" fill="#8b5cf6"/>
      <circle cx="100" cy="0" r="4" fill="#8b5cf6"/>
      <circle cx="200" cy="0" r="4" fill="#8b5cf6"/>
      <circle cx="300" cy="0" r="4" fill="#8b5cf6"/>
      <circle cx="400" cy="0" r="4" fill="#8b5cf6"/>
      
      <!-- Connecting Lines -->
      <path d="M4 0 L96 0" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 4"/>
      <path d="M104 0 L196 0" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 4"/>
      <path d="M204 0 L296 0" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 4"/>
      <path d="M304 0 L396 0" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 4"/>
    </g>
    
    <!-- Decorative Elements -->
    <g transform="translate(50, 300)">
      <circle cx="0" cy="0" r="6" fill="#ef4444" opacity="0.6"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
    </g>
    
    <g transform="translate(550, 350)">
      <circle cx="0" cy="0" r="6" fill="#f59e0b" opacity="0.6"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.3"/>
    </g>
    
    <!-- Central Glow Effect -->
    <circle cx="300" cy="200" r="150" fill="none" stroke="url(#gradient)" stroke-width="2" opacity="0.1"/>
  </g>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
</svg>