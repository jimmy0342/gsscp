<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#3b82f6" rx="6"/>
  
  <!-- Graduation Cap -->
  <g transform="translate(8, 6)">
    <!-- Cap Base -->
    <path d="M0 6 L16 6 L14 9 L2 9 Z" fill="#ffffff" stroke="#1e40af" stroke-width="0.5"/>
    
    <!-- Cap Top -->
    <path d="M2 9 L14 9 L16 12 L0 12 Z" fill="#1e40af" stroke="#1e3a8a" stroke-width="0.5"/>
    
    <!-- Tassel -->
    <circle cx="8" cy="6" r="1" fill="#fbbf24"/>
    <path d="M8 5.5 L8 3" stroke="#fbbf24" stroke-width="0.5" stroke-linecap="round"/>
    <path d="M8 3 L6.5 1.5" stroke="#fbbf24" stroke-width="0.4" stroke-linecap="round"/>
    <path d="M8 3 L9.5 1.5" stroke="#fbbf24" stroke-width="0.4" stroke-linecap="round"/>
  </g>
  
  <!-- Book -->
  <g transform="translate(20, 12)">
    <!-- Book Cover -->
    <rect x="0" y="0" width="8" height="10" rx="1" fill="#10b981" stroke="#059669" stroke-width="0.3"/>
    
    <!-- Book Pages -->
    <rect x="0.5" y="0.5" width="7" height="9" rx="0.5" fill="#ffffff"/>
    
    <!-- Book Title Lines -->
    <rect x="1.5" y="2" width="5" height="0.3" rx="0.15" fill="#10b981"/>
    <rect x="1.5" y="3" width="3" height="0.3" rx="0.15" fill="#10b981"/>
    <rect x="1.5" y="4" width="4" height="0.3" rx="0.15" fill="#10b981"/>
  </g>
</svg>
